<div class="modal-overlay" *ngIf="show" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ mode === 'create' ? 'Nouvelle User Story' : 'Modifier User Story' }}</h2>
      <button class="close-btn" (click)="onClose()">×</button>
    </div>
    
    <form [formGroup]="storyForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="title">Titre</label>
        <input type="text" id="title" formControlName="title" placeholder="Titre de la story">
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" formControlName="description" rows="3" placeholder="Description..."></textarea>
      </div>

      <div class="form-group">
        <label for="priority">Priorité</label>
        <select id="priority" formControlName="priority">
          <option value="LOW">Basse</option>
          <option value="MEDIUM">Moyenne</option>
          <option value="HIGH">Haute</option>
        </select>
      </div>

      <div class="form-group">
        <label>Assigné à</label>
        <div class="members-list">
          <div *ngFor="let member of members" class="member-checkbox">
            <input 
              type="checkbox" 
              [id]="'member-' + member.id"
              [checked]="isAssigned(member)"
              (change)="onMemberChange($event, member)"
            >
            <label [for]="'member-' + member.id">{{ member.username }}</label>
          </div>
        </div>
      </div>

      <div *ngIf="error" class="error-msg">{{ error }}</div>

      <div class="modal-actions">
        <button type="button" class="cancel-btn" (click)="onClose()">Annuler</button>
        <button type="submit" class="submit-btn" [disabled]="!storyForm.valid">
          {{ mode === 'create' ? 'Créer' : 'Sauvegarder' }}
        </button>
      </div>
    </form>
  </div>
</div>
